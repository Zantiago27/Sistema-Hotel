#PARA DESARROLLO
server:
  port: ${PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    #Configuración de Hikari para evitar que el pool guarde estados
    hikari:
      data-source-properties:
      prepareThreshold: 0


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Forzamos a Hibernate a no confiar en sentencias preparadas del lado del servidor
        prepare_all_queries: false

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:84000000}

logging:
  level:
    org.hibernate.SQL: DEBUG
    #com.tuempresa.hotel: DEBUG
    # Ajusta esto al paquete real de tu proyecto para ver tus logs (nuevo)
    com.hotel.sistemahotel: DEBUG